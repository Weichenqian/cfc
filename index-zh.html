<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital Fight Club 课表 (中文)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }
        /* 恢复 logo 的反白处理 */
        .logo-img {
            filter: invert(1);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .slot-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (min-width: 768px) {
            .slot-card:hover {
                transform: translateY(-8px);
                filter: brightness(1.1);
            }
            .header-brand-container {
                min-width: 480px;
            }
        }
    </style>
</head>
<body class="text-white selection:bg-red-500">

    <div class="min-h-screen p-4 md:p-8 max-w-[1400px] mx-auto">
        
        <!-- 页眉 -->
        <header class="flex flex-col md:flex-row justify-between items-center md:items-end mb-8 md:mb-12 gap-8 text-center md:text-left">
            <div class="header-brand-container space-y-4 md:space-y-6 flex flex-col items-center md:items-start w-full md:w-auto">
                <div class="h-16 md:h-28 flex items-center justify-center md:justify-start">
                    <img src="Capital-Fight-Club-logo2.png" alt="Capital Fight Club Logo" class="h-full w-auto logo-img object-contain">
                </div>
                <div class="text-[10px] md:text-[12px] font-black underline decoration-red-600 decoration-2 underline-offset-8 tracking-[0.3em] md:tracking-[0.5em] text-zinc-400 uppercase whitespace-nowrap">
                    &nbsp;&nbsp;&nbsp;&nbsp;拳击&nbsp;&nbsp; · &nbsp;&nbsp;泰拳&nbsp;&nbsp; · &nbsp;&nbsp;实战训练&nbsp;&nbsp;&nbsp;
                </div>
            </div>

            <div class="flex flex-col items-center md:items-end gap-5 w-full md:w-auto">
                <div class="flex gap-6 md:gap-8">
                    <div class="flex items-center gap-2 md:gap-3">
                        <div class="w-3 h-3 md:w-4 md:h-4 bg-red-600 rounded-sm shadow-[0_0_12px_rgba(220,38,38,0.5)]"></div>
                        <span class="text-[11px] md:text-[13px] font-black uppercase tracking-widest text-zinc-200">国贸店 (红底)</span>
                    </div>
                    <div class="flex items-center gap-2 md:gap-3">
                        <div class="w-3 h-3 md:w-4 md:h-4 bg-blue-600 rounded-sm shadow-[0_0_12px_rgba(37,99,235,0.5)]"></div>
                        <span class="text-[11px] md:text-[13px] font-black uppercase tracking-widest text-zinc-200">三里屯店 (蓝底)</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主内容区域 -->
        <div id="schedule-container" class="rounded-[1.5rem] md:rounded-[2.5rem] border border-zinc-800 bg-zinc-900/40 backdrop-blur-xl shadow-2xl overflow-hidden">
            <!-- 桌面端表格 -->
            <div class="hidden md:block overflow-x-auto scrollbar-hide">
                <div class="min-w-[1100px] p-8">
                    <div id="grid-zh" class="grid grid-cols-[100px_repeat(7,1fr)] gap-4"></div>
                </div>
            </div>

            <!-- 移动端列表 -->
            <div class="block md:hidden p-4 space-y-8" id="list-zh"></div>
        </div>

        <!-- 页脚 -->
        <footer class="mt-8 md:mt-12 grid grid-cols-1 lg:grid-cols-3 gap-8 items-center p-6 md:p-10 bg-zinc-900/80 rounded-[2rem] md:rounded-[4rem] border border-zinc-800">
            <div class="space-y-4 md:space-y-6">
                <div class="flex items-center gap-4 md:gap-6">
                    <div class="w-1.5 h-10 md:w-2 md:h-14 bg-red-600 rounded-full shadow-[0_0_15px_#dc2626]"></div>
                    <div>
                        <p class="font-black text-base md:text-lg uppercase tracking-widest text-zinc-100">国贸店</p>
                        <p class="text-[11px] md:text-[13px] text-zinc-500 font-bold italic">朝外 SOHO B座 0256</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 md:gap-6">
                    <div class="w-1.5 h-10 md:w-2 md:h-14 bg-blue-600 rounded-full shadow-[0_0_15px_#2563eb]"></div>
                    <div>
                        <p class="font-black text-base md:text-lg uppercase tracking-widest text-zinc-100">三里屯店</p>
                        <p class="text-[11px] md:text-[13px] text-zinc-500 font-bold italic">世茂工三 4层中庭</p>
                    </div>
                </div>
            </div>

            <div class="hidden lg:flex flex-col items-center">
                <p class="text-6xl font-black italic leading-none text-center tracking-tighter uppercase">
                    BE THE<br/><span class="text-red-600">CAPITAL</span>
                </p>
            </div>

            <div class="flex items-center justify-between md:justify-end gap-4 md:gap-8 bg-black/60 p-4 md:p-6 rounded-[2rem] md:rounded-[3.5rem] border border-white/5">
                <div class="text-right">
                    <p class="text-[10px] md:text-[12px] font-black text-red-600 uppercase tracking-[0.2em] mb-1 md:mb-2">扫码在线预约</p>
                    <p class="text-2xl md:text-3xl font-black leading-none uppercase italic tracking-tighter">立即<br/>报名</p>
                </div>
                <div class="bg-white p-1 rounded-xl md:rounded-2xl w-20 h-20 md:w-28 md:h-28 shadow-2xl flex items-center justify-center overflow-hidden">
                    <img src="Scan-to-Book.jpg" alt="预约二维码" class="w-full h-full object-contain">
                </div>
            </div>
        </footer>
    </div>

    <script>
        const DAYS = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];

        const DATA = [
            { time: "09:30-12:00", slots: [
                { type: 'slt', name: '拳击', coach: '刘连杰', tag: '高级', actualTime: "09:30" },
                { type: 'gm', name: '泰拳', coach: '泰国团队', actualTime: "12:00" },
                { type: 'slt', name: '拳击', coach: '刘连杰', tag: '高级', actualTime: "09:30" },
                null, null,
                { type: 'gm', name: '泰拳', coach: '泰国团队', actualTime: "12:00" },
                { type: 'gm', name: '泰拳', coach: '泰国团队', actualTime: "12:00" }
            ]},
            { time: "12:20-13:00", slots: [
                { type: 'gm', name: '拳击', coach: 'Jerson & Mardi', actualTime: "12:20" },
                { type: 'gm', name: '泰拳', coach: '泰国团队 & Jerson', actualTime: "12:20" },
                { type: 'gm', name: '拳击', coach: 'Jerson', actualTime: "12:20" },
                { type: 'gm', name: '泰拳', coach: '泰国团队 & Jerson', actualTime: "12:20" },
                { type: 'gm', name: '拳击', coach: 'Jerson & Mardi', actualTime: "12:20" },
                { type: 'gm', name: '拳击', coach: 'Jerson & Mardi', actualTime: "13:00" },
                { type: 'gm', name: '拳击', coach: 'Mardi', actualTime: "13:00" }
            ]},
            { time: "15:00-16:00", slots: [
                null, null, 
                { type: 'gm', name: '拳击', coach: 'Jerson', actualTime: "16:00" },
                { type: 'slt', name: '拳击实战', coach: '刘连杰', tag: '实战', actualTime: "15:00" },
                null,
                { type: 'gm', name: '泰拳+缠抱', coach: '泰国团队', note: '(90分钟)', actualTime: "16:00" },
                { type: 'gm', name: '泰拳+缠抱', coach: '泰国团队', note: '(90分钟)', actualTime: "16:00" }
            ]},
            { time: "18:30", slots: [
                { type: 'gm', name: '泰拳', coach: '泰国团队', actualTime: "18:30" },
                { type: 'gm', name: '拳击', coach: 'Jerson', actualTime: "18:30" },
                null, null, null, null, null
            ]},
            { time: "16:00-19:00", slots: [
                { type: 'slt', name: '拳击', coach: 'Jerson', actualTime: "19:00" },
                { type: 'slt', name: '拳击', coach: 'Mardi', actualTime: "19:00" },
                { type: 'slt', name: '拳击', coach: '刘连杰', actualTime: "19:00" },
                { type: 'slt', name: '拳击', coach: 'Mardi', actualTime: "19:00" },
                { type: 'slt', name: '拳击', coach: 'Jerson', actualTime: "19:00" },
                { type: 'slt', name: '拳击实战', coach: 'Jerson & Mardi', actualTime: "16:00" },
                { type: 'slt', name: '拳击实战', coach: '刘连杰', actualTime: "16:00" }
            ]},
            { time: "17:30-20:00", slots: [
                { type: 'gm', name: '拳击', coach: 'Mardi', actualTime: "19:30" },
                { type: 'gm', name: '泰拳', coach: '泰国团队', actualTime: "19:30" },
                { type: 'gm', name: '泰拳', coach: '泰国团队', actualTime: "19:30" },
                { type: 'gm', name: '拳击', coach: 'Jerson', actualTime: "20:00" },
                { type: 'gm', name: '拳击', coach: 'Mardi', actualTime: "19:30" },
                { type: 'slt', name: '拳击', coach: 'Jerson & Mardi', actualTime: "17:30" },
                { type: 'slt', name: '拳击', coach: 'Mardi', actualTime: "17:30" }
            ]}
        ];

        function createCard(cell, isMobile) {
            const bg = cell.type === 'gm' ? 'from-red-600 to-red-700' : 'from-blue-600 to-blue-700';
            const badge = cell.type === 'gm' ? 'bg-red-900/40 text-red-200' : 'bg-blue-900/40 text-blue-200';
            return `
                <div class="h-full ${isMobile ? 'p-4' : 'p-5'} rounded-2xl flex flex-col justify-between slot-card border border-white/10 shadow-lg bg-gradient-to-br ${bg} relative overflow-hidden">
                    <div>
                        <div class="flex justify-between items-start mb-3 gap-1">
                            <span class="px-2.5 py-1 rounded-md ${badge} text-[11px] font-black italic border border-white/10 ring-2 ring-black/10">${cell.actualTime}</span>
                            ${cell.tag ? `<span class="inline-block px-2.5 py-1 rounded-md bg-black/30 text-[10px] font-black tracking-widest">${cell.tag}</span>` : '<span></span>'}
                        </div>
                        <div class="font-black ${isMobile ? 'text-lg' : 'text-xl'} leading-tight tracking-tight">
                            ${cell.name}
                            ${cell.note ? `<span class="text-[10px] block mt-1 font-black opacity-60 italic">${cell.note}</span>` : ''}
                        </div>
                    </div>
                    <div class="text-[11px] font-black uppercase border-t border-white/20 pt-3 mt-3 opacity-95 tracking-wider">${cell.coach}</div>
                </div>`;
        }

        function render() {
            const grid = document.getElementById('grid-zh');
            const list = document.getElementById('list-zh');
            
            grid.innerHTML = '<div class="flex items-center justify-center text-[10px] font-black text-zinc-600 tracking-tighter">TIME</div>';
            DAYS.forEach((day, i) => {
                grid.innerHTML += `<div class="py-5 text-center rounded-2xl bg-zinc-800/60 border border-zinc-700/50 font-black text-sm tracking-widest ${i >= 5 ? 'text-red-500 bg-red-500/5' : 'text-zinc-100'}">${day}</div>`;
            });

            DATA.forEach(row => {
                grid.innerHTML += `<div class="flex items-center justify-center font-black text-zinc-500 italic ${row.time.includes('-') ? 'text-[11px]' : 'text-sm'}">${row.time}</div>`;
                row.slots.forEach(cell => {
                    grid.innerHTML += `<div class="min-h-[145px]">${cell ? createCard(cell, false) : '<div class="h-full rounded-2xl border border-zinc-800/40 bg-zinc-950/40"></div>'}</div>`;
                });
            });

            DAYS.forEach((day, idx) => {
                let html = `<div class="space-y-4"><div class="text-lg font-black tracking-[0.2em] border-b-2 pb-2 ${idx >= 5 ? 'text-red-500 border-red-500/30' : 'text-white border-white/10'}">${day}</div>`;
                let has = false;
                DATA.forEach(row => {
                    if (row.slots[idx]) {
                        has = true;
                        html += createCard(row.slots[idx], true);
                    }
                });
                if (!has) html += `<div class="text-zinc-600 italic text-sm py-2">暂无课程安排</div>`;
                list.innerHTML += html + `</div>`;
            });
        }
        render();
    </script>
</body>
</html>
