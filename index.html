<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital Fight Club Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .logo-filter {
            filter: invert(1) brightness(1.5) drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .slot-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .slot-card:hover {
            transform: translateY(-8px);
            filter: brightness(1.1);
        }
        /* 确保品牌区域宽度稳定，防止中英文切换时布局抖动 */
        .header-brand-container {
            min-width: 480px;
        }
    </style>
</head>
<body class="text-white selection:bg-red-500">

    <div class="min-h-screen p-4 md:p-8 max-w-[1400px] mx-auto">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-8">
            <div class="header-brand-container space-y-6 flex flex-col items-start">
                <div class="h-20 md:h-28 flex items-center justify-start">
                    <img src="Capital-Fight-Club-logo2.png" alt="Logo" class="h-full w-auto logo-filter object-contain">
                </div>
                <!-- 初始状态：中文使用较大的 letter-spacing 以对齐英文长度 -->
                <div id="slogan" class="text-[11px] font-black underline decoration-red-600 decoration-2 underline-offset-8 tracking-[1.95em] text-zinc-400 uppercase whitespace-nowrap transition-all duration-300">
                    拳击 · 泰拳 · 实战
                </div>
            </div>

            <div class="flex flex-col items-end gap-5">
                <!-- Language Switcher -->
                <div class="flex bg-zinc-800 p-1 rounded-full border border-zinc-700 shadow-inner">
                    <button onclick="setLanguage('zh')" id="btn-zh" class="px-6 py-2 rounded-full text-xs font-black transition-all bg-red-600 text-white shadow-lg scale-105">中文</button>
                    <button onclick="setLanguage('en')" id="btn-en" class="px-6 py-2 rounded-full text-xs font-black transition-all text-zinc-400 hover:text-white">EN</button>
                </div>
                
                <!-- Legend -->
                <div class="flex gap-8">
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 bg-red-600 rounded-sm shadow-[0_0_12px_rgba(220,38,38,0.5)]"></div>
                        <span id="legend-gm" class="text-[12px] font-black uppercase tracking-widest text-zinc-200">国贸店</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 bg-blue-600 rounded-sm shadow-[0_0_12px_rgba(37,99,235,0.5)]"></div>
                        <span id="legend-slt" class="text-[12px] font-black uppercase tracking-widest text-zinc-200">三里屯店</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Schedule Grid Container -->
        <div class="overflow-x-auto rounded-[2.5rem] border border-zinc-800 bg-zinc-900/40 backdrop-blur-xl shadow-2xl scrollbar-hide">
            <div class="min-w-[1100px] p-8">
                <div id="schedule-grid" class="grid grid-cols-[100px_repeat(7,1fr)] gap-4">
                    <!-- JS will inject grid content here -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-12 grid grid-cols-1 lg:grid-cols-3 gap-8 items-center p-10 bg-zinc-900/80 rounded-[4rem] border border-zinc-800">
            <div class="space-y-6">
                <div class="flex items-center gap-6">
                    <div class="w-2 h-14 bg-red-600 rounded-full shadow-[0_0_15px_#dc2626]"></div>
                    <div id="addr-gm">
                        <p class="font-black text-lg uppercase tracking-widest text-zinc-100">国贸店 (朝外SOHO)</p>
                        <p class="text-[13px] text-zinc-500 font-bold">朝外SOHO B座 0256</p>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="w-2 h-14 bg-blue-600 rounded-full shadow-[0_0_15px_#2563eb]"></div>
                    <div id="addr-slt">
                        <p class="font-black text-lg uppercase tracking-widest text-zinc-100">三里屯店 (世茂工三)</p>
                        <p class="text-[13px] text-zinc-500 font-bold">世茂工三 4层中庭</p>
                    </div>
                </div>
            </div>

            <div class="hidden lg:flex flex-col items-center">
                <p class="text-6xl font-black italic leading-none text-center tracking-tighter uppercase">
                    BE THE<br/><span class="text-red-600">CAPITAL</span>
                </p>
            </div>

            <div class="flex items-center justify-end gap-8 bg-black/60 p-6 rounded-[3.5rem] border border-white/5">
                <div class="text-right">
                    <p id="scan-text" class="text-[11px] font-black text-red-600 uppercase tracking-[0.4em] mb-2">扫码预约</p>
                    <p id="join-text" class="text-3xl font-black leading-none uppercase italic tracking-tighter">立即<br/>报名</p>
                </div>
                <div class="bg-white p-1.5 rounded-2xl w-28 h-28 shadow-2xl flex items-center justify-center overflow-hidden">
                    <img src="Scan-to-Book.jpg" alt="QR" class="w-full h-full object-contain">
                </div>
            </div>
        </footer>
    </div>

    <script>
        let currentLang = 'zh';

        const DAYS = [
            { zh: '周一', en: 'MON' }, { zh: '周二', en: 'TUE' }, { zh: '周三', en: 'WED' },
            { zh: '周四', en: 'THU' }, { zh: '周五', en: 'FRI' }, { zh: '周六', en: 'SAT' }, { zh: '周日', en: 'SUN' }
        ];

        const SCHEDULE_DATA = [
            {
                timeDisplay: "09:30-12:00",
                slots: [
                    { type: 'sanlitun', name: { zh: '拳击', en: 'Boxing' }, coach: 'Liu Lianjie', tag: { zh: '高级', en: 'Adv.' }, actualTime: "09:30" },
                    { type: 'guomao', name: { zh: '泰拳', en: 'Muay Thai' }, coach: 'Thai Team', actualTime: "12:00" },
                    { type: 'sanlitun', name: { zh: '拳击', en: 'Boxing' }, coach: 'Liu Lianjie', tag: { zh: '高级', en: 'Adv.' }, actualTime: "09:30" },
                    null, null,
                    { type: 'guomao', name: { zh: '泰拳', en: 'Muay Thai' }, coach: 'Thai Team', actualTime: "12:00" },
                    { type: 'guomao', name: { zh: '泰拳', en: 'Muay Thai' }, coach: 'Thai Team', actualTime: "12:00" }
                ]
            },
            {
                timeDisplay: "12:20-13:00",
                slots: [
                    { type: 'guomao', name: { zh: '拳击', en: 'Boxing' }, coach: 'Jerson & Mardi', actualTime: "12:20" },
                    { type: 'guomao', name: { zh: '泰拳', en: 'Muay Thai' }, coach: 'Thai Team & Jerson', actualTime: "12:20" },
                    { type: 'guomao', name: { zh: '拳击', en: 'Boxing' }, coach: 'Jerson', actualTime: "12:20" },
                    { type: 'guomao', name: { zh: '泰拳', en: 'Muay Thai' }, coach: 'Thai Team & Jerson', actualTime: "12:20" },
                    { type: 'guomao', name: { zh: '拳击', en: 'Boxing' }, coach: 'Jerson & Mardi', actualTime: "12:20" },
                    { type: 'guomao', name: { zh: '拳击', en: 'Boxing' }, coach: 'Jerson & Mardi', actualTime: "13:00" },
                    { type: 'guomao', name: { zh: '拳击', en: 'Boxing' }, coach: 'Mardi', actualTime: "13:00" }
                ]
            },
            {
                timeDisplay: "15:00-16:00",
                slots: [
                    null, null, 
                    { type: 'guomao', name: { zh: '拳击', en: 'Boxing' }, coach: 'Jerson', actualTime: "16:00" },
                    { type: 'sanlitun', name: { zh: '拳击实战', en: 'Boxing Spar.' }, coach: 'Liu Lianjie', tag: { zh: '实战', en: 'Spar.' }, actualTime: "15:00" },
                    null,
                    { type: 'guomao', name: { zh: '泰拳+缠抱', en: 'MT + Clinch' }, coach: 'Thai Team', note: '(90m)', actualTime: "16:00" },
                    { type: 'guomao', name: { zh: '泰拳+缠抱', en: 'MT + Clinch' }, coach: 'Thai Team', note: '(90m)', actualTime: "16:00" }
                ]
            },
            {
                timeDisplay: "18:30",
                slots: [
                    { type: 'guomao', name: { zh: '泰拳', en: 'Muay Thai' }, coach: 'Thai Team' },
                    { type: 'guomao', name: { zh: '拳击', en: 'Boxing' }, coach: 'Jerson' },
                    null, null, null, null, null
                ]
            },
            {
                timeDisplay: "16:00-19:00",
                slots: [
                    { type: 'sanlitun', name: { zh: '拳击', en: 'Boxing' }, coach: 'Jerson', actualTime: "19:00" },
                    { type: 'sanlitun', name: { zh: '拳击', en: 'Boxing' }, coach: 'Mardi', actualTime: "19:00" },
                    { type: 'sanlitun', name: { zh: '拳击', en: 'Boxing' }, coach: 'Liu Lianjie', actualTime: "19:00" },
                    { type: 'sanlitun', name: { zh: '拳击', en: 'Boxing' }, coach: 'Mardi', actualTime: "19:00" },
                    { type: 'sanlitun', name: { zh: '拳击', en: 'Boxing' }, coach: 'Jerson', actualTime: "19:00" },
                    { type: 'sanlitun', name: { zh: '拳击实战', en: 'Boxing Spar.' }, coach: 'Jerson & Mardi', actualTime: "16:00" },
                    { type: 'sanlitun', name: { zh: '拳击实战', en: 'Boxing Spar.' }, coach: 'Liu Lianjie', actualTime: "16:00" }
                ]
            },
            {
                timeDisplay: "17:30-20:00",
                slots: [
                    { type: 'guomao', name: { zh: '拳击', en: 'Boxing' }, coach: 'Mardi', actualTime: "19:30" },
                    { type: 'guomao', name: { zh: '泰拳', en: 'Muay Thai' }, coach: 'Thai Team', actualTime: "19:30" },
                    { type: 'guomao', name: { zh: '泰拳', en: 'Muay Thai' }, coach: 'Thai Team', actualTime: "19:30" },
                    { type: 'guomao', name: { zh: '拳击', en: 'Boxing' }, coach: 'Jerson', actualTime: "20:00" },
                    { type: 'guomao', name: { zh: '拳击', en: 'Boxing' }, coach: 'Mardi', actualTime: "19:30" },
                    { type: 'sanlitun', name: { zh: '拳击', en: 'Boxing' }, coach: 'Jerson & Mardi', actualTime: "17:30" },
                    { type: 'sanlitun', name: { zh: '拳击', en: 'Boxing' }, coach: 'Mardi', actualTime: "17:30" }
                ]
            }
        ];

        function renderGrid() {
            const grid = document.getElementById('schedule-grid');
            grid.innerHTML = '';
            const label = document.createElement('div');
            label.className = "flex items-center justify-center text-[10px] font-black text-zinc-600 tracking-tighter uppercase";
            label.innerText = "Schedule";
            grid.appendChild(label);

            DAYS.forEach((day, i) => {
                const dayEl = document.createElement('div');
                const isWeekend = i >= 5;
                dayEl.className = `py-5 text-center rounded-2xl bg-zinc-800/60 border border-zinc-700/50 font-black text-sm tracking-widest ${isWeekend ? 'text-red-500 bg-red-500/5' : 'text-zinc-100'}`;
                dayEl.innerText = currentLang === 'zh' ? day.zh : day.en;
                grid.appendChild(dayEl);
            });

            SCHEDULE_DATA.forEach(row => {
                const timeEl = document.createElement('div');
                const isRange = row.timeDisplay.includes('-');
                timeEl.className = `flex items-center justify-center font-black text-zinc-500 italic ${isRange ? 'text-[11px]' : 'text-sm'}`;
                timeEl.innerText = row.timeDisplay;
                grid.appendChild(timeEl);

                row.slots.forEach(cell => {
                    const cellContainer = document.createElement('div');
                    cellContainer.className = "min-h-[145px]";
                    if (cell) {
                        const bgClass = cell.type === 'guomao' ? 'from-red-600 to-red-700' : 'from-blue-600 to-blue-700';
                        const timeBadgeClass = cell.type === 'guomao' ? 'bg-red-900/40 text-red-200' : 'bg-blue-900/40 text-blue-200';
                        
                        cellContainer.innerHTML = `
                            <div class="h-full p-5 rounded-2xl flex flex-col justify-between slot-card border border-white/10 shadow-lg bg-gradient-to-br ${bgClass} relative overflow-hidden">
                                <div>
                                    <div class="flex justify-between items-start mb-3 gap-1">
                                        ${cell.actualTime ? `<span class="px-2.5 py-1 rounded-md ${timeBadgeClass} text-[11px] font-black italic border border-white/10 ring-2 ring-black/10">${cell.actualTime}</span>` : '<span></span>'}
                                        ${cell.tag ? `<span class="inline-block px-2.5 py-1 rounded-md bg-black/30 text-[9px] font-black uppercase tracking-widest">${currentLang === 'zh' ? cell.tag.zh : cell.tag.en}</span>` : '<span></span>'}
                                    </div>
                                    <div class="font-black text-xl leading-tight tracking-tight">
                                        ${currentLang === 'zh' ? cell.name.zh : cell.name.en}
                                        ${cell.note ? `<span class="text-[10px] block mt-1 font-black opacity-60 italic">${cell.note}</span>` : ''}
                                    </div>
                                </div>
                                <div class="text-[11px] font-black uppercase border-t border-white/20 pt-3 opacity-95 tracking-wider">
                                    ${cell.coach}
                                </div>
                            </div>
                        `;
                    } else {
                        cellContainer.innerHTML = `<div class="h-full rounded-2xl border border-zinc-800/40 bg-zinc-950/40"></div>`;
                    }
                    grid.appendChild(cellContainer);
                });
            });
        }

        function setLanguage(lang) {
            currentLang = lang;
            const btnZh = document.getElementById('btn-zh');
            const btnEn = document.getElementById('btn-en');
            const slogan = document.getElementById('slogan');
            
            if (lang === 'zh') {
                btnZh.className = "px-6 py-2 rounded-full text-xs font-black transition-all bg-red-600 text-white shadow-lg scale-105";
                btnEn.className = "px-6 py-2 rounded-full text-xs font-black transition-all text-zinc-400 hover:text-white";
                slogan.innerText = "拳击 · 泰拳 · 实战";
                // 调整中文间距，使其物理宽度与英文对齐
                slogan.style.letterSpacing = "1.95em";
                slogan.style.paddingRight = "0";
                
                document.getElementById('legend-gm').innerText = "国贸店";
                document.getElementById('legend-slt').innerText = "三里屯店";
                document.getElementById('addr-gm').innerHTML = `<p class="font-black text-lg uppercase tracking-widest text-zinc-100">国贸店 (朝外SOHO)</p><p class="text-[13px] text-zinc-500 font-bold">朝外SOHO B座 0256</p>`;
                document.getElementById('addr-slt').innerHTML = `<p class="font-black text-lg uppercase tracking-widest text-zinc-100">三里屯店 (世茂工三)</p><p class="text-[13px] text-zinc-500 font-bold">世茂工三 4层中庭</p>`;
                document.getElementById('scan-text').innerText = "扫码预约";
                document.getElementById('join-text').innerHTML = "立即<br/>报名";
            } else {
                btnEn.className = "px-6 py-2 rounded-full text-xs font-black transition-all bg-red-600 text-white shadow-lg scale-105";
                btnZh.className = "px-6 py-2 rounded-full text-xs font-black transition-all text-zinc-400 hover:text-white";
                slogan.innerText = "BOXING · MUAY THAI · SPARRING";
                // 英文恢复标准较小的间距
                slogan.style.letterSpacing = "0.5em";
                slogan.style.paddingRight = "0";

                document.getElementById('legend-gm').innerText = "Guomao";
                document.getElementById('legend-slt').innerText = "Sanlitun";
                document.getElementById('addr-gm').innerHTML = `<p class="font-black text-lg uppercase tracking-widest text-zinc-100">Guomao Store</p><p class="text-[13px] text-zinc-500 font-bold">Suite 0256, Building B, Chao Wai SOHO</p>`;
                document.getElementById('addr-slt').innerHTML = `<p class="font-black text-lg uppercase tracking-widest text-zinc-100">Sanlitun Store</p><p class="text-[13px] text-zinc-500 font-bold">4th Floor Atrium, Shimao Gongsan</p>`;
                document.getElementById('scan-text').innerText = "Scan to Book";
                document.getElementById('join-text').innerHTML = "Join<br/>Now";
            }
            renderGrid();
        }

        renderGrid();
    </script>
</body>
</html>
